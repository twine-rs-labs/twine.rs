<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base unit; dense steps for the workbench" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
	body { padding: 22px 24px; background: var(--bg-app); display: flex; align-items: flex-end; gap: 14px; }
	.col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
	.box { background: var(--acc-blue-soft); border: 1px solid var(--acc-blue); border-radius: var(--r-xs); }
	.t { font-family: var(--font-mono); font-size: 9.5px; color: var(--tx-3); }
	.p { font-family: var(--font-mono); font-size: 9px; color: var(--tx-4); }
</style>
</head>
<body>
	<div class="col"><div class="box" style="width:4px;height:4px"></div><span class="t">sp-2</span><span class="p">4</span></div>
	<div class="col"><div class="box" style="width:8px;height:8px"></div><span class="t">sp-4</span><span class="p">8</span></div>
	<div class="col"><div class="box" style="width:12px;height:12px"></div><span class="t">sp-5</span><span class="p">12</span></div>
	<div class="col"><div class="box" style="width:16px;height:16px"></div><span class="t">sp-6</span><span class="p">16</span></div>
	<div class="col"><div class="box" style="width:24px;height:24px"></div><span class="t">sp-8</span><span class="p">24</span></div>
	<div class="col"><div class="box" style="width:32px;height:32px"></div><span class="t">sp-9</span><span class="p">32</span></div>
	<div class="col"><div class="box" style="width:40px;height:40px"></div><span class="t">sp-10</span><span class="p">40</span></div>
	<div class="col"><div class="box" style="width:56px;height:56px"></div><span class="t">sp-11</span><span class="p">56</span></div>
</body>
</html>
