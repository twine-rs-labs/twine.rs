<!-- @dsCard group="Brand" viewport="700x215" name="Iconography · Tabler" subtitle="Tabler Icons, 1.75px stroke — inherited from the codebase" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
	body { padding: 20px 24px; background: var(--bg-app); }
	.eyebrow { font-family: var(--font-ui); font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em;
		text-transform: uppercase; color: var(--tx-4); margin-bottom: 14px; }
	.grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
	.ic { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 21px;
		color: var(--tx-2); background: var(--bg-card); border: 1px solid var(--line-1); border-radius: var(--r-sm); }
	.ic:hover { color: var(--acc-blue); border-color: var(--line-3); }
	.note { font-family: var(--font-mono); font-size: 9.5px; color: var(--tx-4); margin-top: 14px; }
</style>
</head>
<body>
	<div class="eyebrow">Iconography · Tabler Icons · 1.75px stroke</div>
	<div class="grid">
		<i class="ic ti ti-file-text"></i><i class="ic ti ti-binary-tree"></i><i class="ic ti ti-layout-columns"></i>
		<i class="ic ti ti-search"></i><i class="ic ti ti-files"></i><i class="ic ti ti-tags"></i>
		<i class="ic ti ti-variable"></i><i class="ic ti ti-photo"></i><i class="ic ti ti-player-play"></i>
		<i class="ic ti ti-tool"></i><i class="ic ti ti-package-export"></i><i class="ic ti ti-plus"></i>
		<i class="ic ti ti-writing"></i><i class="ic ti ti-trash"></i><i class="ic ti ti-link"></i>
		<i class="ic ti ti-unlink"></i><i class="ic ti ti-alert-triangle"></i><i class="ic ti ti-alert-octagon"></i>
		<i class="ic ti ti-rocket"></i><i class="ic ti ti-focus-2"></i><i class="ic ti ti-grid-dots"></i>
		<i class="ic ti ti-command"></i></div>
	<div class="note">import { IconFileText } from '@tabler/icons-react' · or .ti.ti-file-text via webfont</div>
</body>
</html>
