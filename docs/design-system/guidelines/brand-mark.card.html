<!-- @dsCard group="Brand" viewport="700x230" name="The mark" subtitle="The twine sweep — blue bar resolving into a green curve" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
	body { padding: 0; background: var(--bg-canvas); display: flex; height: 230px; }
	.left { flex: 1; display: flex; align-items: center; justify-content: center;
		background:
			radial-gradient(120% 120% at 30% 20%, oklch(0.24 0.03 240) 0%, var(--bg-canvas) 60%); }
	.lockup { display: flex; align-items: center; gap: 16px; }
	.lockup img { width: 60px; height: 60px; }
	.word { font-family: var(--font-display); font-size: 38px; font-weight: 500; letter-spacing: -0.03em; color: var(--tx-1); }
	.word .rs { color: var(--acc-green); }
	.right { width: 240px; border-left: 1px solid var(--line-1); display: flex; flex-direction: column; }
	.tile { flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px; }
	.tile + .tile { border-top: 1px solid var(--line-1); }
	.tile img { width: 38px; height: 38px; }
	.cap { font-family: var(--font-mono); font-size: 9.5px; color: var(--tx-4); }
</style>
</head>
<body>
	<div class="left">
		<div class="lockup">
			<img src="../assets/twine-mark.svg" alt="twine mark" />
			<span class="word">twine<span class="rs">.rs</span></span>
		</div>
	</div>
	<div class="right">
		<div class="tile" style="background:var(--ink-0)"><img src="../assets/twine-mark.svg" /><span class="cap">on ink-0</span></div>
		<div class="tile" style="background:var(--ink-3)"><img src="../assets/app-release.svg" /><span class="cap">app icon</span></div>
	</div>
</body>
</html>
