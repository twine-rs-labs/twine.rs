<!-- @dsCard group="Type" viewport="700x220" name="Type scale" subtitle="Dense workbench scale, 13px UI base" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
	body { padding: 18px 24px; background: var(--bg-panel); }
	.row { display: flex; align-items: baseline; gap: 14px; padding: 4px 0; border-bottom: 1px solid var(--line-1); }
	.row:last-child { border-bottom: 0; }
	.spec { font-family: var(--font-display); color: var(--tx-1); letter-spacing: -0.02em; white-space: nowrap; }
	.tok { font-family: var(--font-mono); font-size: 10px; color: var(--tx-4); margin-left: auto; }
	.px { font-family: var(--font-mono); font-size: 10px; color: var(--tx-3); width: 44px; text-align: right; }
</style>
</head>
<body>
	<div class="row"><span class="spec" style="font-size:34px">Launcher</span><span class="px">34</span><span class="tok">--fs-3xl</span></div>
	<div class="row"><span class="spec" style="font-size:26px">Screen title</span><span class="px">26</span><span class="tok">--fs-2xl</span></div>
	<div class="row"><span class="spec" style="font-size:20px">Panel heading</span><span class="px">20</span><span class="tok">--fs-xl</span></div>
	<div class="row"><span class="spec" style="font-size:16px">Section title</span><span class="px">16</span><span class="tok">--fs-lg</span></div>
	<div class="row"><span class="spec" style="font-size:13px">Body / UI base</span><span class="px">13</span><span class="tok">--fs-base</span></div>
	<div class="row"><span class="spec" style="font-size:11.5px">Badge / meta</span><span class="px">11.5</span><span class="tok">--fs-xs</span></div>
</body>
</html>
