<!-- @dsCard group="Type" viewport="700x215" name="UI · Hanken Grotesk" subtitle="All interface text and body copy — crisp and even at small sizes" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
	body { padding: 22px 24px; background: var(--bg-app); font-family: var(--font-ui); }
	.eyebrow { font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
		color: var(--tx-4); margin-bottom: 12px; }
	.line { color: var(--tx-2); margin: 0 0 7px; }
	.s16 { font-size: 16px; color: var(--tx-1); font-weight: 600; }
	.s14 { font-size: 14px; }
	.s13 { font-size: 13px; }
	.s12 { font-size: 12px; color: var(--tx-3); }
	.tag { font-family: var(--font-mono); font-size: 9.5px; color: var(--tx-4); }
</style>
</head>
<body>
	<div class="eyebrow">UI · Hanken Grotesk</div>
	<p class="line s16">New Passage · Rename · Reveal in Graph <span class="tag">16 / 600</span></p>
	<p class="line s14">Selecting a passage in the graph opens its source. <span class="tag">14 / 400</span></p>
	<p class="line s13">Moving the cursor inside a passage highlights the node. <span class="tag">13 / 400 · base</span></p>
	<p class="line s12">14 passages · 2,481 words · 3 broken links <span class="tag">12 / 400</span></p>
</body>
</html>
